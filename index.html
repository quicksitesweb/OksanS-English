<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OksanS English</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, sans-serif;
      background: #b9b0a6;
      color: #111111;
    }

    .container {
      width: min(1120px, 92%);
      margin: 0 auto;
    }

    .hero {
      min-height: 100vh;
      display: flex;
      align-items: center;
      padding: 40px 0;
    }

    .hero-grid {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 50px;
      align-items: center;
    }

    .hero-text h1 {
      font-size: 68px;
      line-height: 1.02;
      font-weight: 700;
      margin-bottom: 14px;
      color: #000000;
    }

    .hero-text h2 {
      font-size: 32px;
      line-height: 1.1;
      font-weight: 400;
      margin-bottom: 10px;
      color: #111111;
    }

    .hero-text p {
      font-size: 18px;
      line-height: 1.5;
      color: #2f2f2f;
      max-width: 520px;
    }

    .hero-visual {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .macbook {
      width: 100%;
      max-width: 470px;
    }

    .macbook-screen {
      background: #111111;
      border-radius: 18px 18px 10px 10px;
      padding: 12px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.18);
    }

    .macbook-inner {
      background: #ececec;
      border-radius: 10px;
      min-height: 290px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 36px 28px;
      text-align: center;
    }

    .macbook-inner h3 {
      font-size: 34px;
      line-height: 1.05;
      margin-bottom: 12px;
      font-weight: 700;
      color: #111111;
    }

    .macbook-inner p {
      font-size: 16px;
      line-height: 1.45;
      color: #4a4a4a;
      max-width: 260px;
    }

    .macbook-base {
      width: 112%;
      height: 16px;
      margin-left: -6%;
      background: linear-gradient(to bottom, #d3d3d3, #bdbdbd);
      border-radius: 0 0 14px 14px;
      position: relative;
    }

    .macbook-base::after {
      content: "";
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      top: 1px;
      width: 120px;
      height: 6px;
      background: #a8a8a8;
      border-radius: 0 0 10px 10px;
    }

    @media (max-width: 900px) {
      .hero-grid {
        grid-template-columns: 1fr;
        gap: 36px;
      }

      .hero-text {
        text-align: center;
      }

      .hero-text p {
        margin: 0 auto;
      }

      .hero-text h1 {
        font-size: 52px;
      }

      .hero-text h2 {
        font-size: 28px;
      }
    }

    @media (max-width: 600px) {
      .hero {
        padding: 28px 0;
      }

      .hero-text h1 {
        font-size: 40px;
      }

      .hero-text h2 {
        font-size: 24px;
      }

      .hero-text p {
        font-size: 16px;
      }

      .macbook-inner {
        min-height: 230px;
        padding: 28px 18px;
      }

      .macbook-inner h3 {
        font-size: 26px;
      }
    }
  </style>
</head>
<body>
  <section class="hero">
    <div class="container hero-grid">
      <div class="hero-text">
        <h1>Помогу заговорить<br>на английском уверенно</h1>
        <h2>Без скучных уроков</h2>
        <p>Живое общение, понятная грамматика и практика с первого занятия</p>
      </div>

      <div class="hero-visual">
        <div class="macbook">
          <div class="macbook-screen">
            <div class="macbook-inner">
              <h3>English<br>with confidence</h3>
              <p>Start speaking from your first lesson</p>
            </div>
          </div>
          <div class="macbook-base"></div>
        </div>
      </div>
    </div>
  </section>
</body>
</html>
