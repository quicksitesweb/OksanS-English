<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>English Tutor</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, sans-serif;
      background: #b9b0a6;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .hero {
      width: 100%;
      text-align: center;
      padding: 40px 20px;
    }

    .hero h1 {
      font-size: 72px;
      line-height: 1.05;
      font-weight: 700;
      color: #000;
      margin-bottom: 12px;
    }

    .hero h2 {
      font-size: 42px;
      line-height: 1.1;
      font-weight: 400;
      color: #111;
      margin-bottom: 10px;
    }

    .hero p {
      font-size: 18px;
      color: #2f2f2f;
    }

    @media (max-width: 900px) {
      .hero h1 {
        font-size: 54px;
      }

      .hero h2 {
        font-size: 34px;
      }
    }

    @media (max-width: 600px) {
      .hero h1 {
        font-size: 40px;
      }

      .hero h2 {
        font-size: 28px;
      }

      .hero p {
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
  <section class="hero">
    <h1>Заголовок</h1>
    <h2>Подзаголовок</h2>
    <p>Основной текст</p>
  </section>
</body>
</html>
